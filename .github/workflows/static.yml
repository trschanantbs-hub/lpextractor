<!DOCTYPE html>
<html>
<head>
<title>Clean Page Source Text Extractor - TBS Marketing :)</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}
h1{color:#38bdf8;}
textarea{
width:100%;
height:300px;
padding:10px;
margin-top:10px;
}
button{
background:#22c55e;
border:none;
padding:12px 20px;
margin-top:15px;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}
.stat{margin-top:10px;font-size:16px;}
</style>
</head>
<body>

<h1>Clean Page Source Text Extractor</h1>

<p>Paste full HTML source of a webpage below:</p>
<textarea id="source" placeholder="Paste HTML source here..."></textarea>

<button onclick="extractText()">Extract Text</button>

<div class="stat" id="stats"></div>

<textarea id="output" placeholder="Extracted text will appear here..."></textarea>

<br>
<button onclick="copyText()">Copy Text</button>

<script>
function extractText(){
  let html=document.getElementById("source").value;
  if(!html){
    alert("Paste page source first");
    return;
  }
  
  // Parse HTML
  let parser=new DOMParser();
  let doc=parser.parseFromString(html,"text/html");
  
  // Remove scripts/styles/noscript
  doc.querySelectorAll("script,style,noscript").forEach(e=>e.remove());
  
  // Get visible text
  let text=doc.body.innerText;
  
  // Clean extra spaces & empty lines
  let cleaned=text
      .split("\n")                 // split lines
      .map(line=>line.trim())      // trim each line
      .filter(line=>line.length>0) // remove empty lines
      .join("\n");                 // join with single line break
  
  document.getElementById("output").value=cleaned;
  
  // Word count
  let words=cleaned.split(/\s+/).filter(w=>w.length>0).length;
  document.getElementById("stats").innerHTML="Word count: "+words;
}

function copyText(){
  let txt=document.getElementById("output");
  txt.select();
  document.execCommand("copy");
  alert("Text copied!");
}
</script>

</body>
</html>
